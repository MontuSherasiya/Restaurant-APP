<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Manager – Add Food Item</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-wrapper">
        <header class="site-header">
            <span class="logo">🍽 RestaurantManager</span>
        </header>

        <main class="form-container">
            <h2 class="form-title">Add New Food Item</h2>
            <p class="form-sub">Fill in the details below to add an item to the menu.</p>

            <form id="foodForm" novalidate>

                <div class="form-group">
                    <label for="foodName">Food Name <span class="req">*</span></label>
                    <input type="text" id="foodName" name="foodName" placeholder="e.g. Margherita Pizza" />
                    <span class="error-msg" id="err-name"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="foodPrice">Price (₹) <span class="req">*</span></label>
                        <input type="number" id="foodPrice" name="foodPrice" placeholder="e.g. 299" min="0" />
                        <span class="error-msg" id="err-price"></span>
                    </div>

                    <div class="form-group">
                        <label for="foodCategory">Category <span class="req">*</span></label>
                        <select id="foodCategory" name="foodCategory">
                            <option value="">-- Select Category --</option>
                            <option value="Starters">Starters</option>
                            <option value="Main Course">Main Course</option>
                            <option value="Desserts">Desserts</option>
                            <option value="Beverages">Beverages</option>
                            <option value="Fast Food">Fast Food</option>
                        </select>
                        <span class="error-msg" id="err-category"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="foodDesc">Description</label>
                    <textarea id="foodDesc" name="foodDesc" rows="3"
                        placeholder="Brief description of the item..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn btn-outline">Clear</button>
                    <button type="submit" class="btn btn-primary">Add Item</button>
                </div>
            </form>

            <!-- Food Items Table -->
            <div class="table-section" id="tableSection" style="display:none;">
                <h3 class="table-title">Menu Items</h3>
                <table id="foodTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="foodTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
